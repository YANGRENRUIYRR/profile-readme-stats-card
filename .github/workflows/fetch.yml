name: Fetch and Create PR

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  fetch-and-pr:
    name: Fetch stats card img and create PR
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.PR_MERGE_TOKEN }}
          fetch-depth: 0

      - name: Fetch stats images and update time
        run: |
          # 拉取统计图片
          curl "https://github-readme-stats-kohl-eight-27.vercel.app/api?username=yangrenruiyrr&theme=transparent&include_all_commits=true&show_icons=true&bg_color=DEG,FF0000,FFFF00" -Ls -o github-readme-stats_YANGRENRUIYRR.svg
          curl "https://github-readme-activity-graph-five-sigma.vercel.app/graph?username=yangrenruiyrr&theme=github-compact&hide_border=true&area=true" -Ls -o graph_YANGRENRUIYRR.svg
          curl "https://github-readme-stats-kohl-eight-27.vercel.app/api/top-langs?username=yangrenruiyrr&theme=transparent&include_all_commits=true&show_icons=true&bg_color=DEG,FF0000,FFFF00" -Ls -o top-langs_YANGRENRUIYRR.svg
          # 更新时间戳
          echo "$(date '+%Y-%m-%d %H:%M:%S')">update_time

          # 无变更直接退出
          if [ -z "$(git status --porcelain)" ]; then
            echo "No file changes detected, exiting workflow early"
            exit 0
          fi

      - name: Configure git user
        run: |
          git config --global user.name "杨人瑞"
          git config --global user.email "yangrenruiyrr@163.com"

      # ✅ 修复：正确创建 Issue（先写入临时文件）
      - name: Prepare issue content
        run: |
          echo "自动化任务：更新 GitHub 统计卡片图片" > issue.md
          echo "" >> issue.md
          echo "更新时间：$(date '+%Y-%m-%d %H:%M:%S')" >> issue.md
          echo "由 GitHub Actions 自动创建，完成后自动关闭" >> issue.md

      - name: Create Auto Update Issue
        id: create_issue
        uses: peter-evans/create-issue-from-file@v4
        with:
          title: "[Auto] 自动更新统计图片任务 $(date '+%Y-%m-%d %H:%M:%S')"
          content-filepath: ./issue.md
          labels: auto-update, stats-images
          token: ${{ secrets.PR_MERGE_TOKEN }}

      - name: Create Pull Request (Link Issue)
        id: create_pr
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.PR_MERGE_TOKEN }}
          branch: auto-update-stats-images
          title: "[Auto] Update stats images & Close #${{ steps.create_issue.outputs.issue-number }} $(date '+%Y-%m-%d %H:%M:%S')"
          body: |
            This is an auto-generated PR to update the stats card images.
            Updated at: $(date '+%Y-%m-%d %H:%M:%S')
            
            ### 关联任务
            Closes #${{ steps.create_issue.outputs.issue-number }}
          commit-message: "[Auto] Update stats images $(date '+%Y-%m-%d %H:%M:%S')"
          author: 杨人瑞 <yangrenruiyrr@163.com>
          update-existing-pr: true
          labels: auto-update, stats-images

      - name: Merge PR & Close Issue
        if: steps.create_pr.outputs.pull-request-number != ''
        env:
          PR_NUMBER: ${{ steps.create_pr.outputs.pull-request-number }}
          ISSUE_NUMBER: ${{ steps.create_issue.outputs.issue-number }}
          PAT_TOKEN: ${{ secrets.PR_MERGE_TOKEN }}
        run: |
          # 静默安装 gh，屏蔽警告
          sudo apt update -qq > /dev/null 2>&1
          sudo apt install gh -y -qq > /dev/null 2>&1
          
          echo "$PAT_TOKEN" | gh auth login --with-token > /dev/null 2>&1

          # 检查 PR 状态
          PR_STATE=$(gh pr view $PR_NUMBER --json state -q '.state')
          if [ "$PR_STATE" != "OPEN" ]; then
            echo "PR #$PR_NUMBER is $PR_STATE, skip merge"
            exit 0
          fi

          # 合并 PR
          echo "Merging PR #$PR_NUMBER..."
          gh pr merge $PR_NUMBER \
            --squash \
            --delete-branch \
            -t "[Auto] Merge stats images update $(date '+%Y-%m-%d %H:%M:%S')" \
            --admin \
            > /dev/null 2>&1

          # 关闭 Issue
          echo "Closing Issue #$ISSUE_NUMBER..."
          gh issue close $ISSUE_NUMBER --reason "completed" > /dev/null 2>&1

          echo "✅ 执行成功"
          echo "PR #$PR_NUMBER 已合并"
          echo "Issue #$ISSUE_NUMBER 已关闭"
